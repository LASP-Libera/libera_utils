
[tool.poetry]
name = "libera_sdp"
version = "0.1.0"
description = "Science data processing library and applications for the Libera instrument."
authors = ["Gavin Medley <gavin.medley@lasp.colorado.edu>", "Stephane Beland <stephane.beland@lasp.colorado.edu>"]

[[tool.poetry.source]]
name = "lasp-pypi"  # This name will be used in the configuration to retreive the proper credentials
url = "https://artifacts.pdmz.lasp.colorado.edu/repository/lasp-pypi/simple"  # URL used to download your packages from

[tool.poetry.dependencies]
python = "^3.9"
astropy = "^4.2.1"
h5py = "^3.3.0"
numpy = "^1.21.0"
spiceypy = "^4.0.1"
lasp-packets = "1.0"
requests = "^2.26.0"
matplotlib = {version = "^3.4.3", optional = true}

[tool.poetry.dev-dependencies]
pytest-cov = "^2.12.1"
pylint = "^2.9.3"
responses = "^0.14.0"
pytest-randomly = "^3.10.2"

[tool.poetry.extras]
plotting = ["matplotlib"]

[tool.poetry.scripts]
sdp = 'libera_sdp.cli:main'

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
