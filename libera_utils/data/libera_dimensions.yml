# ===============================================
# Standard dimensions for all Libera data products
# Every dimension in any product must be defined here, even if it is only a scalar dimension (size 1).
# The long_name for dimensions here is only for documentation purposes; it is not used in validation
# nor will it appear in data products. A dimension is simply a name in NetCDF and xarray. Other
# attributes, such as size are used to validate the data inside a data product during conformance checking.
# ===============================================
N_HOURS:
  size: 24
  long_name: "Hour within a day"
EUCLIDEAN_DIM:
  size: 3
  long_name: "3D Euclidean space dimension"
QUATERNION_DIM:
  size: 4
  long_name: "Quaternion dimension"
CAMERA_PIXEL_COUNT_X:
  size: 2048
  long_name: "The X-axis dimension of the camera images"
CAMERA_PIXEL_COUNT_Y:
  size: 2048
  long_name: "The Y-axis dimension of the camera images"
RADIOMETER_TIME:
  long_name: "Radiometer time dimension"
CAMERA_TIME:
  long_name: "Camera time dimension"
PACKET:
  long_name: "Packet index for all packets in the data product"
PACKET_JPSS_TIME:
  long_name: "Packet creation time from spacecraft clock"
ADGPS_JPSS_TIME:
  long_name: "SC position (ephemeris) sample time from spacecraft clock"
ADCFA_JPSS_TIME:
  long_name: "SC control frame attitude sample time from spacecraft clock"
PACKET_ICIE_TIME:
  long_name: "Packet creation time from ICIE main processor clock"
AXIS_SAMPLE_ICIE_TIME:
  long_name: "Azimuth and elevation encoder sample time from ICIE main processor clock"
RAD_SAMPLE_FPE_TIME:
  long_name: "Radiometer sample time"
RAD_FULL_FPE_TIME:
  long_name: "Radiometer full resolution sample time"
CAL_SAMPLE_FPE_TIME:
  long_name: "Calibration sample time"
CAL_FULL_FPE_TIME:
  long_name: "Calibration full resolution sample time"
ARRAY_128:
  size: 128
  long_name: "Array index dimension (128 elements) for arrays that come per packet"
ARRAY_8:
  size: 8
  long_name: "Array index dimension (8 elements) for arrays that come per packet"

# Calibration event product packet dimensions (per-APID prefixed to avoid collisions in merged flat files)
NOM_HK_PACKET:
  long_name: "Packet index for NOM-HK packets in calibration events"
PEV_SW_STAT_PACKET:
  long_name: "Packet index for PEV-SW-STAT packets in calibration event"
PEC_SW_STAT_PACKET:
  long_name: "Packet index for PEC-SW-STAT packets in calibration event"
RAD_SAMPLE_PACKET:
  long_name: "Packet index for RAD-SAMPLE packets in calibration event"
RAD_FULL_PACKET:
  long_name: "Packet index for RAD-FULL packets in calibration event"
AXIS_SAMPLE_PACKET:
  long_name: "Packet index for AXIS-SAMPLE packets in calibration event"
CAL_FULL_PACKET:
  long_name: "Packet index for CAL-FULL packets in calibration event"
CAL_SAMPLE_PACKET:
  long_name: "Packet index for CAL-SAMPLE packets in calibration event"
WFOV_SCI_PACKET:
  long_name: "Packet index for WFOV-SCI packets in calibration event"

# ADM Specific dimensions
# Viewing geometry. Used for both Libera-Camera (ERBE-like using only the Libera WFOV camera) and Libera-Imager (CERES-TRMM-like including VIIRS data) products so no size is specified.
SZA_BIN:
  long_name: "Solar zenith angle bin index. 10 bins for Libera-Camera products, 9 bins for Libera-Imager scene types."
SZA_BIN_EDGES:
  long_name: "Solar zenith angle bin edges. Defines the upper bound of each bin and is inclusive. 11 bins for Libera-Camera products, 10 bins for Libera-Imager scene types."
VZA_BIN:
  long_name: "Viewing zenith angle bin index. 7 bins for Libera-Camera products, 9 bins for Libera-Imager scene types."
VZA_BIN_EDGES:
  long_name: "Viewing zenith angle bin edges. Defines the upper bound of each bin and is inclusive. 8 bins for Libera-Camera products, 10 bins for Libera-Imager scene types."
RAA_BIN:
  long_name: "Relative azimuth angle bin index. 8 bins for Libera-Camera products, 10 bins for Libera-Imager scene types."
RAA_BIN_EDGES:
  long_name: "Relative azimuth angle bin edges. Defines the upper bound of each bin and is inclusive. 9 bins for Libera-Camera products, 11 bins for Libera-Imager scene types."

# Surface types
SURFACE_TYPE_BIN:
  long_name: "Surface type bin index. 1:Ocean, 2:Land, 3:Snow, 4:Desert. Used for Libera-only surface types"
  size: 4
LAND_SURFACE_TYPE_BIN:
  long_name: "Land surface type bin index. 1: Mod-hi_tree/shrub_coverage, 2:Low-mod tree/shrub coverage, 3:Dark desert, 4:Bright desert, 5:Snow/ice, 6:Other. Used for Libera+VIIRS scene types land surface types"
  size: 5

# Atmospheric Properties
CLOUD_FRACTION_BIN:
  long_name: "Cloud fraction bin index. Used for Libera-only cloud fraction bins"
  size: 4
CLOUD_OPTICAL_DEPTH_LAND_BIN:
  long_name: "Land scene cloud optical depth bin index. Used for Libera-Imager scene types cloud optical depth bins"
  size: 6
CLOUD_OPTICAL_DEPTH_LAND_BIN_EDGES:
  long_name: "Land scene cloud optical depth bin edges. Defines the upper bound of each bin and is inclusive. Used for Libera-Imager scene types cloud optical depth bins"
  size: 7
CLOUD_OPTICAL_DEPTH_OCEAN_BIN:
  long_name: "Ocean scene cloud optical depth bin index. Used for Libera-Imager scene types cloud optical depth bins"
  size: 14
CLOUD_OPTICAL_DEPTH_OCEAN_BIN_EDGES:
  long_name: "Ocean scene cloud optical depth bin edges. Defines the upper bound of each bin and is inclusive. Used for Libera-Imager scene types cloud optical depth bins"
  size: 15
CLOUD_PHASE_BIN:
  long_name: "Cloud phase bin index. 1:Liquid, 2:Ice. Used for Libera-Imager scene types cloud phase"
  size: 2
WIND_SPEED_BIN:
  long_name: "10m wind speed bin index. Used for Libera-Imager scene types wind speed bins"
  size: 4
WIND_SPEED_BIN_EDGES:
  long_name: "10m wind speed bin edges. Defines the upper bound of each bin and is inclusive. Used for Libera-Imager scene types wind speed bins"
  size: 5
