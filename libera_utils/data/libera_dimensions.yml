# ===============================================
# Standard dimensions for all Libera data products
# Every dimension in any product must be defined here, even if it is only a scalar dimension (size 1).
# The long_name for dimensions here is only for documentation purposes; it is not used in validation
# nor will it appear in data products. A dimension is simply a name in NetCDF and xarray. Other
# attributes, such as size are used to validate the data inside a data product during conformance checking.
# ===============================================
N_HOURS:
  size: 24
  long_name: "Hour within a day"
EUCLIDEAN_DIM:
  size: 3
  long_name: "3D Euclidean space dimension"
QUATERNION_DIM:
  size: 4
  long_name: "Quaternion dimension"
CAMERA_PIXEL_COUNT_X:
  size: 2048
  long_name: "The X-axis dimension of the camera images"
CAMERA_PIXEL_COUNT_Y:
  size: 2048
  long_name: "The Y-axis dimension of the camera images"
RADIOMETER_TIME:
  long_name: "Radiometer time dimension"
CAMERA_TIME:
  long_name: "Camera time dimension"
PACKET:
  long_name: "Packet index for all packets in the data product"
PACKET_JPSS_TIME:
  long_name: "Packet creation time from spacecraft clock"
ADGPS_JPSS_TIME:
  long_name: "SC position (ephemeris) sample time from spacecraft clock"
ADCFA_JPSS_TIME:
  long_name: "SC control frame attitude sample time from spacecraft clock"
PACKET_ICIE_TIME:
  long_name: "Packet creation time from ICIE main processor clock"
AXIS_SAMPLE_ICIE_TIME:
  long_name: "Azimuth and elevation encoder sample time from ICIE main processor clock"
RAD_SAMPLE_FPE_TIME:
  long_name: "Radiometer sample time"
RAD_FULL_FPE_TIME:
  long_name: "Radiometer full resolution sample time"
CAL_SAMPLE_FPE_TIME:
  long_name: "Calibration sample time"
CAL_FULL_FPE_TIME:
  long_name: "Calibration full resolution sample time"
ARRAY_128:
  size: 128
  long_name: "Array index dimension (128 elements) for arrays that come per packet"
ARRAY_8:
  size: 8
  long_name: "Array index dimension (8 elements) for arrays that come per packet"

# Calibration event product packet dimensions (per-APID prefixed to avoid collisions in merged flat files)
NOM_HK_PACKET:
  long_name: "Packet index for NOM-HK packets in calibration events"
PEV_SW_STAT_PACKET:
  long_name: "Packet index for PEV-SW-STAT packets in calibration event"
PEC_SW_STAT_PACKET:
  long_name: "Packet index for PEC-SW-STAT packets in calibration event"
RAD_SAMPLE_PACKET:
  long_name: "Packet index for RAD-SAMPLE packets in calibration event"
RAD_FULL_PACKET:
  long_name: "Packet index for RAD-FULL packets in calibration event"
AXIS_SAMPLE_PACKET:
  long_name: "Packet index for AXIS-SAMPLE packets in calibration event"
CAL_FULL_PACKET:
  long_name: "Packet index for CAL-FULL packets in calibration event"
CAL_SAMPLE_PACKET:
  long_name: "Packet index for CAL-SAMPLE packets in calibration event"
WFOV_SCI_PACKET:
  long_name: "Packet index for WFOV-SCI packets in calibration event"
