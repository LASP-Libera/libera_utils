# Solar Calibration Face 1 L1A event product definition
# ProductID: SOLAR-CAL-FACE1-DECODED  (OBSIDs 384-387)
#
# Each source APID gets a uniquely prefixed dimension and time coordinate:
#   NOM-HK:      NOM_HK_PACKET     / NOM_HK_PACKET_ICIE_TIME
#   PEV-SW-STAT: PEV_SW_PACKET     / PEV_SW_PACKET_ICIE_TIME
#   RAD-SAMPLE:  RAD_PACKET         / RAD_PACKET_ICIE_TIME  (packet-level)
#                RAD_SAMPLE_FPE_TIME                (200 Hz sample-level)
#
# CCSDS header variables that appear in all three source APIDs (VERSION, TYPE,
# SEC_HDR_FLAG, PKT_APID, SEQ_FLGS, SRC_SEQ_CTR, PKT_LEN, REUSABLE_SPARE_8)
# are kept verbatim from NOM-HK; copies from PEV-SW-STAT are prefixed
# 'PEV_SW__' and copies from RAD-SAMPLE are prefixed 'RAD__'.
#
# Two derived variables are appended immediately after the raw NOM-HK temps:
#   ICIE__FPE_TSCOPE_TEMP_K  -- FPE telescope temperature (K)
#   ICIE__CFPE_SWCR_TEMP_K   -- SWCR temperature (K)

attributes:
  {
    ProductID: SOLAR-CAL-FACE1-DECODED,
    algorithm_version: null,
    date_created: null,
    input_files: null,
    solar_cal_face: null,
    event_pass_index: null,
    source_obsids: null
  }
coordinates:
  NOM_HK_PACKET_ICIE_TIME:
    dtype: datetime64[ns]
    dimensions: [NOM_HK_PACKET]
    attributes:
      long_name: Packet timestamp from ICIE main processor (NOM-HK)
      valid_range: ["1900-01-01T00:00:00", "2100-01-01T00:00:00"]
    encoding:
      { units: nanoseconds since 1958-01-01, calendar: standard, dtype: int64 }
  PEV_SW_PACKET_ICIE_TIME:
    dtype: datetime64[ns]
    dimensions: [PEV_SW_PACKET]
    attributes:
      { long_name: Packet timestamp from ICIE main processor (PEV-SW-STAT) }
    encoding:
      { units: nanoseconds since 1958-01-01, calendar: standard, dtype: int64 }
  RAD_PACKET_ICIE_TIME:
    dtype: datetime64[ns]
    dimensions: [RAD_PACKET]
    attributes:
      { long_name: Packet timestamp from ICIE main processor (RAD-SAMPLE) }
    encoding:
      { units: nanoseconds since 1958-01-01, calendar: standard, dtype: int64 }
  RAD_SAMPLE_FPE_TIME:
    dtype: datetime64[ns]
    dimensions: [RAD_SAMPLE_FPE_TIME]
    attributes:
      { long_name: Radiometer sample timestamp from FPE (samples at 200Hz) }
    encoding:
      { units: nanoseconds since 1958-01-01, calendar: standard, dtype: int64 }
variables:
  VERSION:
    dtype: uint8
    dimensions: [NOM_HK_PACKET]
    attributes:
      long_name: Packet version
      valid_range: [0, 7]
  TYPE:
    dtype: uint8
    dimensions: [NOM_HK_PACKET]
    attributes:
      long_name: Packet type
      valid_range: [0, 1]
  SEC_HDR_FLAG:
    dtype: uint8
    dimensions: [NOM_HK_PACKET]
    attributes:
      long_name: Secondary header flag
      valid_range: [0, 1]
  PKT_APID:
    dtype: uint16
    dimensions: [NOM_HK_PACKET]
    attributes:
      long_name: Packet application ID
      valid_range: [0, 2047]
  SEQ_FLGS:
    dtype: uint8
    dimensions: [NOM_HK_PACKET]
    attributes:
      long_name: Sequence flags
      valid_range: [0, 3]
  SRC_SEQ_CTR:
    dtype: uint16
    dimensions: [NOM_HK_PACKET]
    attributes:
      long_name: Source sequence counter
      valid_range: [0, 16383]
  PKT_LEN:
    dtype: uint16
    dimensions: [NOM_HK_PACKET]
    attributes: { long_name: Packet length, units: bytes }
  ICIE__TM_DAY_NOM_HK:
    dtype: uint16
    dimensions: [NOM_HK_PACKET]
    attributes:
      { long_name: ICIE telemetry day for packet, units: integer days }
  ICIE__TM_MS_NOM_HK:
    dtype: uint32
    dimensions: [NOM_HK_PACKET]
    attributes:
      long_name: ICIE telemetry milliseconds for packet
      units: integer milliseconds
      valid_range: [0, 86399999]
  ICIE__TM_US_NOM_HK:
    dtype: uint16
    dimensions: [NOM_HK_PACKET]
    attributes:
      long_name: ICIE telemetry microseconds for packet
      units: integer microseconds
