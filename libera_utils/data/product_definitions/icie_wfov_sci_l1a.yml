attributes:
  ProductID: WFOV-SCI-DECODED
  algorithm_version: null
  date_created: null
  input_files: null
  MissingSOPOrEOPCount: null
  BadImageCount: null
  CompleteImageCount: null
  CRCErrorCount: null
coordinates:
  PACKET_ICIE_TIME:
    dtype: datetime64[ns]
    dimensions: ["PACKET"]
    attributes:
      long_name: Packet timestamp from ICIE main processor
    encoding:
      units: nanoseconds since 1958-01-01
      calendar: standard
      dtype: int64
  CAMERA_TIME:
    dtype: datetime64[ns]
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: WFOV camera image acquisition time from FSW header
      comment: >-
        First-exposure FSW acquisition time for each complete stitched image.
        In DUAL img_mode the second sequential exposure lags by about 111-350 ms
        and is not stored as a separate L1A time. Under VIDEO (img_mode==1),
        CAMERA_TIME may duplicate; use (CAMERA_TIME, CAMERA_PACKET_INDEX).
    encoding:
      units: nanoseconds since 1958-01-01
      calendar: standard
      dtype: int64
variables:
  VERSION:
    dtype: uint8
    dimensions: ["PACKET"]
    attributes:
      long_name: Packet version
      valid_range: [0, 7]
  TYPE:
    dtype: uint8
    dimensions: ["PACKET"]
    attributes:
      long_name: Packet type
      valid_range: [0, 1]
  SEC_HDR_FLAG:
    dtype: uint8
    dimensions: ["PACKET"]
    attributes:
      long_name: Secondary header flag
      valid_range: [0, 1]
  PKT_APID:
    dtype: uint16
    dimensions: ["PACKET"]
    attributes:
      long_name: Packet application ID
      valid_range: [0, 2047]
  SEQ_FLGS:
    dtype: uint8
    dimensions: ["PACKET"]
    attributes:
      long_name: Sequence flags
      valid_range: [0, 3]
  SRC_SEQ_CTR:
    dtype: uint16
    dimensions: ["PACKET"]
    attributes:
      long_name: Source sequence counter
      valid_range: [0, 16383]
  PKT_LEN:
    dtype: uint16
    dimensions: ["PACKET"]
    attributes:
      long_name: Packet length
      units: bytes
  ICIE__TM_DAY_WFOV_SCI:
    dtype: uint16
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE telemetry day for packet
      units: integer days
  ICIE__TM_MS_WFOV_SCI:
    dtype: uint32
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE telemetry milliseconds for packet
      units: integer milliseconds
      valid_range: [0, 86399999]
  ICIE__TM_US_WFOV_SCI:
    dtype: uint16
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE telemetry microseconds for packet
      units: integer microseconds
      valid_range: [0, 999]
  REUSABLE_SPARE_8:
    dtype: uint8
    dimensions: ["PACKET"]
    attributes:
      long_name: Reusable spare field (8 bits)
  ICIE__MEM_DUMP_NAME_WFOV_0:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 0
  ICIE__MEM_DUMP_NAME_WFOV_1:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 1
  ICIE__MEM_DUMP_NAME_WFOV_2:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 2
  ICIE__MEM_DUMP_NAME_WFOV_3:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 3
  ICIE__MEM_DUMP_NAME_WFOV_4:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 4
  ICIE__MEM_DUMP_NAME_WFOV_5:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 5
  ICIE__MEM_DUMP_NAME_WFOV_6:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 6
  ICIE__MEM_DUMP_NAME_WFOV_7:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 7
  ICIE__MEM_DUMP_OFFSET_WFOV:
    dtype: uint32
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump offset
  ICIE__MEM_DUMP_LENGTH_WFOV:
    dtype: uint32
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump length
  ICIE__MEM_DUMP_TRANS_WFOV:
    dtype: uint16
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump transaction ID
  ICIE__MEM_DUMP_FLAGS_WFOV:
    dtype: "|S8"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump flags
  ICIE__WFOV_DATA:
    dtype: "|S972"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV camera image data (aggregated)
  ICIE__WFOV_SCI_CHECKSUM:
    dtype: uint32
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV camera science data checksum
  PACKET_IMAGE_ID:
    dtype: int32
    dimensions: ["PACKET"]
    attributes:
      long_name: Complete WFOV image index for packet (-1 if not part of a complete image)
      comment: Maps each packet to its stitched image index on CAMERA_TIME, or -1 when incomplete
  CAMERA_PACKET_INDEX:
    dtype: int32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Packet index for WFOV image start (qualifying SOP)
      comment: Maps each CAMERA_TIME row to its originating packet index
  WFOV_FSW_PARSE_VALID:
    dtype: bool
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Whether full FSW header was parsed from SOP packet slice
  WFOV_FPGA_PARSE_VALID:
    dtype: bool
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Whether FPGA header block was parsed from stitched image blob
  WFOV_IMAGE_BLOB:
    dtype: uint8
    dimensions: ["CAMERA_TIME", "BLOB_BYTE"]
    attributes:
      long_name: Compressed JPEG-LS pixel payload (FPGA DATA frame contents after headers/footers)
      comment: Use WFOV_IMAGE_BLOB_LENGTH to determine valid bytes; padding beyond length is zero
  WFOV_IMAGE_BLOB_LENGTH:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Valid byte length of WFOV_IMAGE_BLOB for each complete image
  WFOV_FSW_FSW_LENGTH:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW header length field
  WFOV_FSW_JPEG_BYPASS:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW JPEG bypass flag (1 = JPEG compression disabled)
  WFOV_FSW_BITMASK_DISABLE:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW bitmask disable flag (1 = pixel bitmask processing disabled)
  WFOV_FSW_TESTPATTERN:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW test pattern flag (1 = test pattern enabled)
  WFOV_FSW_BITMASK_ID:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW custom bitmask slot identifier
      comment: Custom mask slot 0-3 when using CUSTOM_* masks; do not confuse with WFOV_FSW_PIXEL_MASK_ID
  WFOV_FSW_IMG_MODE:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW FPGA processing select (img_mode), not WFOV_CAM_START command mode
      comment: >-
        0=DUAL, 1=VIDEO, 2=IMGA, 3=IMGB. In DUAL, CAMERA_TIME is the first
        integration; the second sequential exposure lags by about 111-350 ms and
        is not a second L1A timestamp. VIDEO may yield two NAND images with
        identical FSW timestamps; distinguish via CAMERA_PACKET_INDEX.
  WFOV_FSW_PIXEL_MASK_ID:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW pixel mask type from WFOV_CAM_START
      comment: >-
        Mask type (e.g. 0=FF, 1=NADIR, 2=FORWARD, 8=ADM, 128=RAPS). Later frames
        in a sequence may show 0 even when a mask was applied on the first frame.
  WFOV_FSW_SIMULATOR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW simulator flag
  WFOV_FSW_CADENCE:
    dtype: uint16
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW imaging cadence
      units: milliseconds
  WFOV_FSW_IMAGE_TOTAL:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW total images in sequence
  WFOV_FSW_IMAGE_COUNT:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW image count in sequence
  WFOV_FSW_FLASH_WRITE_POINTER:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW flash write pointer
  WFOV_FSW_TIMESTAMP_SECONDS:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW acquisition timestamp seconds
      units: integer seconds
      comment: Combined with WFOV_FSW_TIMESTAMP_SUBSECONDS to form CAMERA_TIME; first integration in DUAL
  WFOV_FSW_TIMESTAMP_SUBSECONDS:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW acquisition timestamp subseconds
      units: integer microseconds
      comment: Combined with WFOV_FSW_TIMESTAMP_SECONDS to form CAMERA_TIME; first integration in DUAL
  WFOV_FSW_RAD_OBS_ID:
    dtype: uint16
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW radiometer observation ID
  WFOV_FSW_CAM_OBS_ID:
    dtype: uint16
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW camera observation ID
  WFOV_FSW_COMMANDED_EXP_TIME_1:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW commanded exposure time 1
      units: milliseconds
  WFOV_FSW_COMMANDED_EXP_TIME_2:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW commanded exposure time 2
      units: milliseconds
  WFOV_FSW_AZIMUTH_ANGLE:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW azimuth angle
      units: radians
      comment: FSW-reported instrument azimuth; distinct from L1B geometric viewing/solar azimuth angles
  WFOV_FPGA_IMAGE_LENGTH:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA SpaceWire packet length (bytes)
      comment: >-
        Expected SpaceWire packet size: 98-byte header (49 x 2-byte fields) + 2 protocol
        bytes + (frames_per_readout x 2 x width x height) + footer_size.
  WFOV_FPGA_FLAGS:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA header flags (EOS, PIX_RES, BIN_TYPE, FRAME_TYPE packed)
      comment: >-
        EOS = last frame of sequence. PIX_RES b0=12 bits/pixel, b1=10 bits/pixel.
        BIN_TYPE b0=no binning, b1=2x2 average. FRAME_TYPE b000=normal sensor frame,
        b111=FPGA test mode; other values reserved.
  WFOV_FPGA_FRAME_ID:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA frame ID in video sequence (0 for single images; starts at 0)
  WFOV_FPGA_TAG:
    dtype: uint64
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA user-configured 8-byte frame tag (same for all frames in a video)
  WFOV_FPGA_ACTUAL_EXP_TIME_1:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: >-
        FPGA sensor integration time register 1 (raw counts; ms = (value + 0.43*20) * 129.0 * 0.15625 / 1000)
      units: raw counts
  WFOV_FPGA_TEMPERATURE:
    dtype: uint16
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA sensor temperature register
  WFOV_FPGA_GAIN:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA sensor ADC gain register
  WFOV_FPGA_WIDTH:
    dtype: uint16
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA window width (pixels)
  WFOV_FPGA_HEIGHT:
    dtype: uint16
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA window height (pixels)
  WFOV_FPGA_OFFSET_X:
    dtype: uint16
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA window X offset (pixels)
  WFOV_FPGA_OFFSET_Y:
    dtype: uint16
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA window Y offset (pixels)
  WFOV_FPGA_READOUT:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA sensor readout/exposure mode
      comment: >-
        Sensor readout SINGLE/DUAL; independent of FSW
        WFOV_FSW_IMG_MODE. Do not use to infer command mode or VIDEO pairing.
  WFOV_FPGA_ACTUAL_EXP_TIME_2:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: >-
        FPGA exposure time 2 for interleaved/dual mode (odd-row or second-frame
        integration; raw counts; ms = (value + 0.43*20) * 129.0 * 0.15625 / 1000)
      units: raw counts
  WFOV_FPGA_DELTA:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: >-
        FPGA DELTA_EXP between two frame requests in dual exposure (Exp step in multi-frame readout)
  WFOV_FPGA_EXPOSURE_STEP:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA EXP_STEP exposure step between frames in the same multi-readout group
  WFOV_FPGA_NR_SLOPES:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA NR_SLOPES piecewise number of slopes
  WFOV_FPGA_KP1:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA EXP_KP1 piecewise exposure kneepoint 1
  WFOV_FPGA_KP2:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA EXP_KP2 piecewise exposure kneepoint 2
  WFOV_FPGA_VLOW_3:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA VLOW3 piecewise voltage threshold 3
  WFOV_FPGA_VLOW_2:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA VLOW2 piecewise voltage threshold 2
  WFOV_FPGA_EXP_SEQ:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA EXP_SEQ number of frames in the readout sequence
  WFOV_FPGA_FOOTER_SIZE:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA footer size in words (typically 18; pixel sum, dark/white counts, etc.)
  WFOV_FPGA_PIXEL_SUM:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA footer PIX_SUM sum of all pixel values
  WFOV_FPGA_DARK:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA footer NB_DARK count of pixels below the sensor black limit register
  WFOV_FPGA_WHITE:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA footer NB_WHITE count of pixels above the sensor white limit register
  WFOV_FPGA_FOOTER_DELTA:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA footer FRAME_DELTA_TIME difference vs previous frame timestamp
  WFOV_FPGA_CRC:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA internal footer CRC (metadata only; not validated in L1A)
  WFOV_FPGA_SYNC_ERROR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA sync error status flag
  WFOV_FPGA_PID_ERROR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA PID error status flag
  WFOV_FPGA_SIZE_ERROR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA size error status flag
  WFOV_FPGA_EOP_ERROR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA EOP error status flag
  WFOV_FPGA_EEP_ERROR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA EEP error status flag
  WFOV_FPGA_CRC_ERROR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA CRC error status flag
  WFOV_FPGA_DROP_ERROR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FPGA drop error status flag
  WFOV_TRAILING_FOOTER_PIXEL_SUM:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Trailing NAND footer PIX_SUM sum of all pixel values
  WFOV_TRAILING_FOOTER_DARK:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Trailing NAND footer dark count/level (NB_DARK-related)
  WFOV_TRAILING_FOOTER_WHITE:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Trailing NAND footer white count (from FPGA internal footer when available)
  WFOV_TRAILING_FOOTER_DELTA:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Trailing NAND footer FRAME_DELTA_TIME (from FPGA internal footer when available)
  WFOV_TRAILING_FOOTER_CRC:
    dtype: uint32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Trailing NAND footer CRC (metadata only; not validated in L1A)
  WFOV_TRAILING_FOOTER_SPARE:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Trailing NAND footer spare status bit
  WFOV_TRAILING_FOOTER_DROP_ERROR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Trailing NAND footer drop error status flag
  WFOV_TRAILING_FOOTER_CRC_ERROR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Trailing NAND footer CRC error status flag
  WFOV_TRAILING_FOOTER_EEP_ERROR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Trailing NAND footer EEP error status flag
  WFOV_TRAILING_FOOTER_EOP_ERROR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Trailing NAND footer EOP error status flag
  WFOV_TRAILING_FOOTER_SIZE_ERROR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Trailing NAND footer size error status flag
  WFOV_TRAILING_FOOTER_PID_ERROR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Trailing NAND footer PID error status flag
  WFOV_TRAILING_FOOTER_SYNC_ERROR:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Trailing NAND footer sync error status flag
