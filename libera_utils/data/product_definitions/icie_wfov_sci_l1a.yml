attributes:
  ProductID: WFOV-SCI-DECODED
  algorithm_version: null
  date_created: null
  input_files: null
coordinates:
  PACKET_ICIE_TIME:
    dtype: datetime64[ns]
    dimensions: ["PACKET"]
    attributes:
      long_name: Packet timestamp from ICIE main processor
    encoding:
      units: nanoseconds since 1958-01-01
      calendar: standard
      dtype: int64
  CAMERA_TIME:
    dtype: datetime64[ns]
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: WFOV camera image acquisition time from FSW header
    encoding:
      units: nanoseconds since 1958-01-01
      calendar: standard
      dtype: int64
variables:
  VERSION:
    dtype: uint8
    dimensions: ["PACKET"]
    attributes:
      long_name: Packet version
      valid_range: [0, 7]
  TYPE:
    dtype: uint8
    dimensions: ["PACKET"]
    attributes:
      long_name: Packet type
      valid_range: [0, 1]
  SEC_HDR_FLAG:
    dtype: uint8
    dimensions: ["PACKET"]
    attributes:
      long_name: Secondary header flag
      valid_range: [0, 1]
  PKT_APID:
    dtype: uint16
    dimensions: ["PACKET"]
    attributes:
      long_name: Packet application ID
      valid_range: [0, 2047]
  SEQ_FLGS:
    dtype: uint8
    dimensions: ["PACKET"]
    attributes:
      long_name: Sequence flags
      valid_range: [0, 3]
  SRC_SEQ_CTR:
    dtype: uint16
    dimensions: ["PACKET"]
    attributes:
      long_name: Source sequence counter
      valid_range: [0, 16383]
  PKT_LEN:
    dtype: uint16
    dimensions: ["PACKET"]
    attributes:
      long_name: Packet length
      units: bytes
  ICIE__TM_DAY_WFOV_SCI:
    dtype: uint16
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE telemetry day for packet
      units: integer days
  ICIE__TM_MS_WFOV_SCI:
    dtype: uint32
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE telemetry milliseconds for packet
      units: integer milliseconds
      valid_range: [0, 86399999]
  ICIE__TM_US_WFOV_SCI:
    dtype: uint16
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE telemetry microseconds for packet
      units: integer microseconds
      valid_range: [0, 999]
  REUSABLE_SPARE_8:
    dtype: uint8
    dimensions: ["PACKET"]
    attributes:
      long_name: Reusable spare field (8 bits)
  ICIE__MEM_DUMP_NAME_WFOV_0:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 0
  ICIE__MEM_DUMP_NAME_WFOV_1:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 1
  ICIE__MEM_DUMP_NAME_WFOV_2:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 2
  ICIE__MEM_DUMP_NAME_WFOV_3:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 3
  ICIE__MEM_DUMP_NAME_WFOV_4:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 4
  ICIE__MEM_DUMP_NAME_WFOV_5:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 5
  ICIE__MEM_DUMP_NAME_WFOV_6:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 6
  ICIE__MEM_DUMP_NAME_WFOV_7:
    dtype: "|S1"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump name character 7
  ICIE__MEM_DUMP_OFFSET_WFOV:
    dtype: uint32
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump offset
  ICIE__MEM_DUMP_LENGTH_WFOV:
    dtype: uint32
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump length
  ICIE__MEM_DUMP_TRANS_WFOV:
    dtype: uint16
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump transaction ID
  ICIE__MEM_DUMP_FLAGS_WFOV:
    dtype: "|S8"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV memory dump flags
  ICIE__WFOV_DATA:
    dtype: "|S972"
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV camera image data (aggregated)
  ICIE__WFOV_SCI_CHECKSUM:
    dtype: uint32
    dimensions: ["PACKET"]
    attributes:
      long_name: ICIE WFOV camera science data checksum
  CAMERA_PACKET_INDEX:
    dtype: int32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Packet index for WFOV image start (qualifying SOP)
      comment: Maps each CAMERA_TIME row to its originating packet index
  WFOV_FSW_PARSE_VALID:
    dtype: bool
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Whether full FSW header was parsed from SOP packet slice
  WFOV_FPGA_PARSE_VALID:
    dtype: bool
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Whether FPGA header block was parsed from SOP packet slice
  WFOV_IMAGE_COMPLETE:
    dtype: bool
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Whether mem-dump sequence from SOP to EOP is contiguous
  WFOV_FSW_FSW_LENGTH:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW header length field
  WFOV_FSW_JPEG_BYPASS:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW JPEG bypass flag
  WFOV_FSW_BITMASK_DISABLE:
    dtype: uint8
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: FSW bitmask disable flag
  WFOV_FSW_TESTPATTERN:
