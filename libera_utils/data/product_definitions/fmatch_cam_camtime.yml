# =============================================================================
# FMATCH-CAM-CAMTIME Data Product Definition
# =============================================================================

attributes:
  ProductID: FMATCH-CAM-CAMTIME
  algorithm_version: null
  date_created: null
  input_files: null #

coordinates:
  CAMERA_TIME:
    dtype: datetime64[ns]
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Camera footprint observation time
    encoding:
      units: nanoseconds since 1958-01-01
      calendar: standard
      dtype: int64

variables:
  # ---------------------------------------------------------------------------
  # (a) Geolocation inputs (from L1B Daily): lat, lon, alt, sza, vza, raa.
  # ---------------------------------------------------------------------------
  latitude:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Footprint boresight latitude
      units: degrees_north
      valid_range: [-90, 90]
  longitude:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Footprint boresight longitude
      units: degrees_east
      valid_range: [-180, 180]
  altitude:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # This value is the center-pixel geolocated SURFACE height taken straight from
      # the L1B Daily Camera `Altitude` field (camera_segmentation._build_footprint),
      # i.e. terrain elevation above the WGS84 ellipsoid at the footprint boresight --
      # NOT the ~835 km spacecraft altitude. The L1B field declares valid_range
      # [-1000, 30000] m, which is mirrored here so the two products agree.
      long_name: Footprint center-pixel surface height above the WGS84 ellipsoid
      units: meters
      valid_range: [-1000, 30000]
  solar_zenith_angle:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Solar zenith angle
      units: degrees
      valid_range: [0, 180]
  viewing_zenith_angle:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Viewing zenith angle
      units: degrees
      valid_range: [0, 180]
  relative_azimuth_angle:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Relative azimuth angle between Sun and sensor
      units: degrees
      valid_range: [0, 360]

  # ---------------------------------------------------------------------------
  # (b) Derived viewing geometry (computed from the angles above; CERES/SSF
  #     heritage). Math lives in
  #     libera_utils/footprint_matching/product.compute_derived_viewing_geometry().
  # ---------------------------------------------------------------------------
  sunglint_angle:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Sun glint angle
      units: degrees
      valid_range: [0, 180]

  # ---------------------------------------------------------------------------
  # (c) PSF-aggregated external variables (one value per footprint).
  # ---------------------------------------------------------------------------
  # --- source reader: era5 (resolution 25.0 km) ---
  era5_ECMWF_wind_u10:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Eastward wind component at 10 m
      units: "m/s"
  era5_ECMWF_wind_u10_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Eastward wind component at 10 m (within-footprint standard deviation)
      units: "m/s"
  era5_ECMWF_wind_v10:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Northward wind component at 10 m
      units: "m/s"
  era5_ECMWF_wind_v10_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Northward wind component at 10 m (within-footprint standard deviation)
      units: "m/s"
  # --- source reader: igbp (resolution 1.0 km) ---
  igbp_MODIS_surface_type:
    dtype: int16
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: IGBP surface type classification
      valid_range: [1, 20]
  igbp_MODIS_surface_type_primary:
    dtype: int16
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Most common IGBP surface type in footprint
      valid_range: [1, 20]
  igbp_MODIS_surface_type_secondary:
    dtype: int16
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Second most common IGBP surface type in footprint
      valid_range: [1, 20]
  igbp_MODIS_surface_type_tertiary:
    dtype: int16
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Third most common IGBP surface type in footprint
      valid_range: [1, 20]
  # --- source reader: nise (resolution 25.0 km) ---
  nise_SSMIS_sea_ice_concentration:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Sea ice concentration (fraction)
      units: "1"
      valid_range: [0, 1]
  nise_SSMIS_sea_ice_concentration_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Sea ice concentration (fraction) (within-footprint standard deviation)
      units: "1"
  nise_SSMIS_no_ice_or_snow:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Fraction of footprint with no ice or snow (NISE code 0)
      units: "1"
      valid_range: [0, 1]
  nise_SSMIS_no_ice_or_snow_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Fraction of footprint with no ice or snow (NISE code 0) (within-footprint standard deviation)
      units: "1"
  nise_SSMIS_permanent_ice:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Fraction of footprint covered by permanent ice (NISE code 101)
      units: "1"
      valid_range: [0, 1]
  nise_SSMIS_permanent_ice_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Fraction of footprint covered by permanent ice (NISE code 101) (within-footprint standard deviation)
      units: "1"
  nise_SSMIS_dry_snow_on_land:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Fraction of footprint covered by dry snow on land (NISE codes 103-110)
      units: "1"
      valid_range: [0, 1]
  nise_SSMIS_dry_snow_on_land_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Fraction of footprint covered by dry snow on land (NISE codes 103-110) (within-footprint standard deviation)
      units: "1"
  nise_SSMIS_snow_ice_missing:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Fraction of footprint with missing NISE retrieval (NISE code 255)
      units: "1"
      valid_range: [0, 1]
  nise_SSMIS_snow_ice_missing_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Fraction of footprint with missing NISE retrieval (NISE code 255) (within-footprint standard deviation)
      units: "1"
  # --- source reader: viirs_brdf (resolution 5.6 km) ---
  viirs_brdf_NOAA20_brdf_shortwave_fiso:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Shortwave BRDF isotropic kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_shortwave_fiso_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Shortwave BRDF isotropic kernel weight (within-footprint standard deviation)
      units: "1"
  viirs_brdf_NOAA20_brdf_shortwave_fvol:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Shortwave BRDF volumetric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_shortwave_fvol_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Shortwave BRDF volumetric kernel weight (within-footprint standard deviation)
      units: "1"
  viirs_brdf_NOAA20_brdf_shortwave_fgeo:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Shortwave BRDF geometric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_shortwave_fgeo_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Shortwave BRDF geometric kernel weight (within-footprint standard deviation)
      units: "1"
  viirs_brdf_NOAA20_brdf_vis_fiso:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Visible BRDF isotropic kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_vis_fiso_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Visible BRDF isotropic kernel weight (within-footprint standard deviation)
      units: "1"
  viirs_brdf_NOAA20_brdf_vis_fvol:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Visible BRDF volumetric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_vis_fvol_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Visible BRDF volumetric kernel weight (within-footprint standard deviation)
      units: "1"
  viirs_brdf_NOAA20_brdf_vis_fgeo:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Visible BRDF geometric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_vis_fgeo_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Visible BRDF geometric kernel weight (within-footprint standard deviation)
      units: "1"
  viirs_brdf_NOAA20_brdf_nir_fiso:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Near-infrared BRDF isotropic kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_nir_fiso_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Near-infrared BRDF isotropic kernel weight (within-footprint standard deviation)
      units: "1"
  viirs_brdf_NOAA20_brdf_nir_fvol:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Near-infrared BRDF volumetric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_nir_fvol_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Near-infrared BRDF volumetric kernel weight (within-footprint standard deviation)
      units: "1"
  viirs_brdf_NOAA20_brdf_nir_fgeo:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Near-infrared BRDF geometric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_nir_fgeo_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Near-infrared BRDF geometric kernel weight (within-footprint standard deviation)
      units: "1"
  # --- source reader: viirs_cloud (resolution 111.0 km) ---
  viirs_cloud_NOAA20_cloud_optical_thickness:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Cloud optical thickness
      units: "1"
  viirs_cloud_NOAA20_cloud_optical_thickness_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Cloud optical thickness (within-footprint standard deviation)
      units: "1"
  viirs_cloud_NOAA20_cloud_top_pressure:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Cloud top pressure
      units: "hPa"
  viirs_cloud_NOAA20_cloud_top_pressure_standard_deviation:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Cloud top pressure (within-footprint standard deviation)
      units: "hPa"

  # ---------------------------------------------------------------------------
  # (e) Libera WFOV CAM algorithm outputs (NOT from external readers).
  #     Per-footprint values produced by Libera's CF-CAM algorithm and merged into
  #     the record.
  # ---------------------------------------------------------------------------
  cloud_fraction_camera:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Cloud fraction (Libera WFOV)
      units: "1"
      valid_range: [0, 1]

  # ---------------------------------------------------------------------------
  # (d) Coverage / QA bookkeeping
  # ---------------------------------------------------------------------------
  psf_bbox_lat_min:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Southern latitude bound of PSF bounding box
      units: degrees_north
      valid_range: [-90, 90]
  psf_bbox_lat_max:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Northern latitude bound of PSF bounding box
      units: degrees_north
      valid_range: [-90, 90]
  psf_bbox_lon_min:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Western longitude bound of PSF bounding box
      units: degrees_east
      valid_range: [-180, 180]
  psf_bbox_lon_max:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Eastern longitude bound of PSF bounding box
      units: degrees_east
      valid_range: [-180, 180]
  psf_coverage_fraction:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Fraction of PSF energy covered by valid ancillary data
      units: "1"
      valid_range: [0, 1]
  q_flags:
    # int32 (not int64): only a handful of bits are defined, and the previous
    # int64 dtype paired with an int32-max valid_range was internally inconsistent.
    dtype: int32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Quality flags (bitwise)
      # CF flag metadata for the bits set by camera_segmentation.CameraFootprintQualityFlag.
      # flag_masks/flag_meanings let a consumer decode each bit without reading source:
      #   1 = partial_coverage           (some -- not all -- block corners were off-Earth,
      #                                    so the bounding box covers only part of the block)
      #   2 = center_pixel_substituted   (the geometric centre pixel was off-Earth, so the
      #                                    nearest valid pixel was used as the boresight)
      # valid_range spans 0 (clean) through all defined bits OR-combined (1 | 2 == 3).
      flag_masks: [1, 2]
      flag_meanings: "partial_coverage center_pixel_substituted"
      valid_range: [0, 3]

  # ---------------------------------------------------------------------------
  # (f) Camera pixel-block provenance (FMATCH-CAM-CAMTIME only).
  #     Each pseudo-footprint is a contiguous block of L1B camera pixels
  #     (camera_segmentation.PseudoFootprint). These indices trace a footprint back
  #     to its source pixels in the L1B Daily Camera grid (dimensions
  #     CAMERA_PIXEL_COUNT_X x CAMERA_PIXEL_COUNT_Y). The *_start indices are
  #     inclusive and the *_stop indices are exclusive (Python slice convention), so
  #     the block spans pixels [start, stop) on each axis. The centre-pixel indices
  #     point at the boresight stand-in, after any nearest-valid substitution (see
  #     the center_pixel_substituted q_flags bit).
  # ---------------------------------------------------------------------------
  center_pixel_x:
    dtype: int32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Boresight center) pixel index along CAMERA_PIXEL_COUNT_X
  center_pixel_y:
    dtype: int32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Boresight (center) pixel index along CAMERA_PIXEL_COUNT_Y
  camera_pixel_x_start:
    dtype: int32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Inclusive start pixel index of the block along CAMERA_PIXEL_COUNT_X
  camera_pixel_x_stop:
    dtype: int32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Exclusive stop pixel index of the block along CAMERA_PIXEL_COUNT_X
  camera_pixel_y_start:
    dtype: int32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Inclusive start pixel index of the block along CAMERA_PIXEL_COUNT_Y
  camera_pixel_y_stop:
    dtype: int32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Exclusive stop pixel index of the block along CAMERA_PIXEL_COUNT_Y
