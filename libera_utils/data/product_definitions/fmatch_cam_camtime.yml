# =============================================================================
# FMATCH-CAM-CAMTIME Data Product Definition
# =============================================================================
# Footprint Match - Libera Camera Only (camera time).
#
# Timescale: Camera    Latency: Camera (Near Real Time)
#
# Camera-timescale sibling of FMATCH-CAM. Uses L1B Daily Camera as the primary
# input: footprints are derived for all data within each camera image frame, so
# no image interpolation is needed. Same external reader set as FMATCH-CAM.
#
# This is an SSF-style, per-footprint record: each footprint is one entry along
# the CAMERA_TIME dimension and is identified by its time. The variables below are:
#   (a) geolocation inputs (from L1B Daily),
#   (b) derived viewing geometry (computed from the geolocation angles),
#   (c) PSF-aggregated external variables - exactly the variables produced by the
#       readers active in this mode: era5, igbp, nise, viirs_brdf, viirs_cloud
#       (ReaderRegistry.get_readers_for_mode), each collapsed to ONE value per
#       footprint, and
#   (d) coverage / QA bookkeeping.
#
# Loaded and validated by LiberaDataProductDefinition.from_yaml(). Global
# attributes (Format, Conventions, Project*, Platform*, algorithm_version, ...)
# are injected automatically from required_product_attributes.yml.
#
# NAMING: variable names are <source_key>_<instrument>_<spec_name> for provenance,
# with the instrument token from each reader's INSTRUMENT attribute
# (e.g. era5_ECMWF_wind_u10, igbp_MODIS_surface_type, viirs_cloud_NOAA20_cloud_optical_thickness). DTYPEs
# are taken verbatim from each reader's VariableSpec so the schema matches the
# aggregation output.
# See: instructions/documentation/Footprint Matching and Scene ID PDF, §1.4.
# =============================================================================

attributes:
  ProductID: FMATCH-CAM-CAMTIME
  algorithm_version: null # semantic version of the FMATCH algorithm that produced the file
  date_created: null # ISO-8601 UTC timestamp of file creation
  input_files: null # provenance: the L1B + ancillary input files used

coordinates:
  # The per-footprint identifier. Each footprint is uniquely identified by its
  # observation time, so CAMERA_TIME is both the dimension and the coordinate.
  CAMERA_TIME:
    dtype: datetime64[ns]
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Camera footprint observation time
    encoding:
      units: nanoseconds since 1958-01-01
      calendar: standard
      dtype: int64

variables:
  # ---------------------------------------------------------------------------
  # (a) Geolocation inputs (from L1B Daily): lat, lon, alt, sza, vza, raa.
  # ---------------------------------------------------------------------------
  latitude:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Footprint boresight latitude
      units: degrees_north
      valid_range: [-90, 90]
  longitude:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Footprint boresight longitude
      units: degrees_east
      valid_range: [-180, 180]
  altitude:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Spacecraft altitude above reference ellipsoid
      units: meters
  solar_zenith_angle:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Solar zenith angle
      units: degrees
      valid_range: [0, 180]
  viewing_zenith_angle:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Viewing zenith angle
      units: degrees
      valid_range: [0, 180]
  relative_azimuth_angle:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Relative azimuth angle between Sun and sensor
      units: degrees
      valid_range: [0, 360]

  # ---------------------------------------------------------------------------
  # (b) Derived viewing geometry (computed from the angles above; CERES/SSF
  #     heritage). Math lives in
  #     libera_utils/footprint_matching/product.compute_derived_viewing_geometry().
  # ---------------------------------------------------------------------------
  sunglint_angle:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # Angle between the view direction and the specular reflection of the Sun.
      long_name: Sun glint angle
      units: degrees
      valid_range: [0, 180]

  # ---------------------------------------------------------------------------
  # (c) PSF-aggregated external variables (one value per footprint).
  # ---------------------------------------------------------------------------
  # --- source reader: era5 (resolution 25.0 km) ---
  era5_ECMWF_wind_u10:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: era5 (aggregation: weighted_mean)
      long_name: Eastward wind component at 10 m
      units: "m/s"
  era5_ECMWF_wind_v10:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: era5 (aggregation: weighted_mean)
      long_name: Northward wind component at 10 m
      units: "m/s"
  # --- source reader: igbp (resolution 1.0 km) ---
  igbp_MODIS_surface_type:
    dtype: int16
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: igbp (aggregation: weighted_mode)
      # https://climatedataguide.ucar.edu/climate-data/ceres-igbp-land-classification
      long_name: IGBP surface type classification
      valid_range: [1, 20]
  # --- source reader: nise (resolution 25.0 km) ---
  nise_SSMIS_sea_ice_concentration:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: nise (aggregation: weighted_mean)
      # PSF-weighted mean sea ice concentration derived from NISE Extent codes 1–100
      # (code / 100.0). Permanent ice (code 101) counts as 1.0. Range [0, 1].
      # https://nsidc.org/data/nise/versions/5
      long_name: Sea ice concentration (fraction)
      units: "1"
      valid_range: [0, 1]
  nise_SSMIS_no_ice_or_snow:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: nise (aggregation: weighted_mean)
      # Fraction of PSF-weighted footprint area where NISE code 0 (no ice or snow —
      # open ocean, snow-free land, or outside grid). Range [0, 1].
      long_name: Fraction of footprint with no ice or snow (NISE code 0)
      units: "1"
      valid_range: [0, 1]
  nise_SSMIS_permanent_ice:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: nise (aggregation: weighted_mean)
      # Fraction of PSF-weighted footprint area where NISE code 101 (permanent ice:
      # Greenland Ice Sheet, Antarctic ice shelves). Range [0, 1].
      long_name: Fraction of footprint covered by permanent ice (NISE code 101)
      units: "1"
      valid_range: [0, 1]
  nise_SSMIS_dry_snow_on_land:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: nise (aggregation: weighted_mean)
      # Fraction of PSF-weighted footprint area where NISE codes 103–110 (dry snow
      # on land). Range [0, 1].
      long_name: Fraction of footprint covered by dry snow on land (NISE codes 103-110)
      units: "1"
      valid_range: [0, 1]
  nise_SSMIS_snow_ice_missing:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: nise (aggregation: weighted_mean)
      # Fraction of PSF-weighted footprint area where NISE code 255 (missing/no
      # retrieval). High values flag unreliable ice/snow classification.
      long_name: Fraction of footprint with missing NISE retrieval (NISE code 255)
      units: "1"
      valid_range: [0, 1]
  # --- source reader: viirs_brdf (resolution 5.6 km) ---
  viirs_brdf_NOAA20_brdf_shortwave_fiso:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Shortwave BRDF isotropic kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_shortwave_fvol:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Shortwave BRDF volumetric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_shortwave_fgeo:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Shortwave BRDF geometric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_vis_fiso:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Visible BRDF isotropic kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_vis_fvol:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Visible BRDF volumetric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_vis_fgeo:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Visible BRDF geometric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_nir_fiso:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Near-infrared BRDF isotropic kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_nir_fvol:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Near-infrared BRDF volumetric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_nir_fgeo:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Near-infrared BRDF geometric kernel weight
      units: "1"
  # --- source reader: viirs_cloud (resolution 111.0 km) ---
  viirs_cloud_NOAA20_cloud_optical_thickness:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: viirs_cloud (aggregation: weighted_log_mean)
      long_name: Cloud optical thickness
      units: "1"
  viirs_cloud_NOAA20_cloud_top_pressure:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # source: viirs_cloud (aggregation: weighted_mean)
      long_name: Cloud top pressure
      units: "hPa"

  # ---------------------------------------------------------------------------
  # (e) Internal algorithm outputs (NOT from external readers).
  #     Per-footprint values produced by Libera's own algorithms and merged into
  #     the record after PSF aggregation, so they get their own section rather
  #     than sitting under the reader-sourced (c) variables.
  # ---------------------------------------------------------------------------
  cam_cloud_fraction:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      # Per-footprint cloud fraction from the Camera Cloud Fraction (CF-CAM)
      # algorithm using Libera's Wide Field-of-View (WFOV) camera. Already
      # aggregated to one value per footprint upstream, so it is attached
      # directly to the FMATCH record (no reader / PSF step here).
      long_name: Cloud fraction (Libera WFOV)
      # CF "1" = dimensionless ratio; quoted so YAML keeps it a string, matching
      # the other unitless variables in this product.
      units: "1"
      valid_range: [0, 1] # 0 = clear, 1 = fully cloudy

  # ---------------------------------------------------------------------------
  # (d) Coverage / QA bookkeeping (design §1.4; CERES partial-coverage convention).
  # ---------------------------------------------------------------------------
  psf_bbox_lat_min:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Southern latitude bound of PSF bounding box
      units: degrees_north
      valid_range: [-90, 90]
  psf_bbox_lat_max:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Northern latitude bound of PSF bounding box
      units: degrees_north
      valid_range: [-90, 90]
  psf_bbox_lon_min:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Western longitude bound of PSF bounding box
      units: degrees_east
      valid_range: [-180, 180]
  psf_bbox_lon_max:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Eastern longitude bound of PSF bounding box
      units: degrees_east
      valid_range: [-180, 180]
  psf_coverage_fraction:
    dtype: float32
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Fraction of PSF energy covered by valid ancillary data
      units: "1"
      valid_range: [0, 1]
  q_flags:
    dtype: int64
    dimensions: ["CAMERA_TIME"]
    attributes:
      long_name: Quality flags (bitwise)
      valid_range: [0, 2147483647]
