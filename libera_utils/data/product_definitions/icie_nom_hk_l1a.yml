coordinates:
  PACKET_ICIE_TIME:
    dtype: datetime64[ns]
    dimensions: ["PACKET"]
    attributes:
      long_name: Packet timestamp from ICIE main processor
      valid_range: ["1900-01-01T00:00:00", "2100-01-01T00:00:00"]
    encoding:
      units: nanoseconds since 1958-01-01
      calendar: standard
      dtype: int64
