# Libera SCENE-ID-CAM product definition.
#
# SCENE-ID-CAM is the radiometer-timescale, lowest-latency (camera/NRT) scene-identification product, available
# from year 1 of the mission (see the "Footprint Matching and Scene ID" design document, section 1.3). It carries,
# for every radiometer footprint, the input scene properties read from the CERES SSF file, the derived physical
# variables, and the resulting scene IDs (ERBE and unfiltering classifications) plus the property-bin bounds each
# matched scene occupies. SCENE-ID-CAM runs the ERBE and unfiltering classifications, but not TRMM.
#
# The product is written on the "RADIOMETER_TIME" dimension with a "radiometer_time" coordinate, exactly mirroring
# the upstream L1B_RAD product, so scene IDs line up 1:1 with L1B radiometer footprints. The variable set and dtypes
# below match what FootprintData.identify_scenes() + FootprintData.to_radiometer_time_product() produce; see
# libera_utils/scene_identification/scene_id.py.

attributes:
  ProductID: SCENE-ID-CAM
  # These are populated at write time by the runner / write_libera_data_product (they must be present but their
  # values vary per file), matching the pattern used by the other Libera product definitions.
  algorithm_version: null
  date_created: null
  input_files: null

coordinates:
  # Time of observation, one value per footprint. Copied from the L1B_RAD/CAM coordinate convention so downstream
  # code can treat scene IDs and L1B records on a common time axis. The values are absolute datetimes; the encoding
  # re-expresses them as int64 "nanoseconds since 1958-01-01" (the CCSDS epoch used across Libera products).
  radiometer_time:
    dtype: datetime64[ns]
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: >-
        Time of each radiometer footprint observation (UTC) against a base reference of the CCSDS Epoch
        (January 1, 1958). Uniquely identifies each radiometer footprint.
    encoding:
      units: nanoseconds since 1958-01-01
      calendar: standard
      dtype: int64

variables:
  #########################################
  # Input scene properties (from CERES SSF)
  #########################################
  # These ten variables are read directly from the CERES SSF file. See scene_id.py
  # (_extract_data_from_CeresSSFNOAA20FM6Ed1C) for the exact NetCDF groups/variables and the CERES SSF reference:
  # https://ceres.larc.nasa.gov/data/#ssf-level-2
  igbp_surface_type:
    dtype: int16
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: IGBP (International Geosphere-Biosphere Programme) land cover classification code
      valid_range: [1, 20]
  clear_area:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Clear-sky area of the footprint
      units: percent
      valid_range: [0, 100]
  cloud_fraction_lower:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Cloud fraction for the lower atmospheric layer
      units: percent
      valid_range: [0, 100]
  cloud_fraction_upper:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Cloud fraction for the upper atmospheric layer
      units: percent
      valid_range: [0, 100]
  
  ###########################################
  # Derived scene properties (computed by SDC)
  ###########################################
  # SCENE-ID-CAM runs the ERBE and unfiltering classifications, which both key off surface_type and cloud_fraction.
  # Only those two derived variables are therefore computed for this product (by
  # FootprintData._calculate_required_fields(); see the _CALCULATED_VARIABLE_MAP in scene_id.py). The other derived
  # variables (surface_wind, optical_depth, cloud_phase) are only needed by the TRMM classification, which this
  # product does not run, so they are intentionally omitted here.
  surface_type:
    dtype: int64
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: TRMM surface type mapped from the IGBP land cover code (0 = ocean ... 5 = snow)
      valid_range: [0, 5]
  cloud_fraction:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Total cloud fraction over the footprint, 100 - clear_area
      units: percent
      valid_range: [0, 100]

  ############
  # Scene IDs
  ############
  # Each scene_id_{type} column holds the classification result for one scene definition. A value of 0 means the
  # footprint matched no scene in that definition. The accompanying scene_bin_{type}_{variable}_min/_max columns
  # report the (min, max) bounds of the property bin the matched scene occupies for each classification variable
  # (NaN for unmatched footprints). See scene_definitions.py (identify_and_update, report_bin_bounds=True).
  # SCENE-ID-CAM runs the ERBE and unfiltering classifications (not TRMM).
  scene_id_erbe:
    dtype: int32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: ERBE-like scene classification ID (0 = unmatched, 1-11 = scene)
      valid_range: [0, 11]
  scene_id_unfiltering:
    dtype: int32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Unfiltering scene classification ID (0 = unmatched, 1-11 = scene)
      valid_range: [0, 11]

  ##############################
  # ERBE scene property-bin bounds
  ##############################
  # The ERBE classification uses two variables (surface_type and cloud_fraction); each contributes a min/max pair.
  scene_bin_erbe_cloud_fraction_min:
    dtype: float64
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Lower bound (inclusive) of the cloud_fraction bin of the matched ERBE scene
      units: percent
  scene_bin_erbe_cloud_fraction_max:
    dtype: float64
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Upper bound (exclusive) of the cloud_fraction bin of the matched ERBE scene
      units: percent
  scene_bin_erbe_surface_type_min:
    dtype: float64
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Lower bound (inclusive) of the surface_type bin of the matched ERBE scene
  scene_bin_erbe_surface_type_max:
    dtype: float64
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Upper bound (exclusive) of the surface_type bin of the matched ERBE scene

  #####################################
  # Unfiltering scene property-bin bounds
  #####################################
  # The unfiltering classification uses two variables (surface_type and cloud_fraction); each contributes a
  # min/max pair. Bounds are float64 so unbounded edges and unmatched footprints can be represented as NaN.
  scene_bin_unfiltering_cloud_fraction_min:
    dtype: float64
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Lower bound (inclusive) of the cloud_fraction bin of the matched unfiltering scene
      units: percent
  scene_bin_unfiltering_cloud_fraction_max:
    dtype: float64
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Upper bound (exclusive) of the cloud_fraction bin of the matched unfiltering scene
      units: percent
  scene_bin_unfiltering_surface_type_min:
    dtype: float64
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Lower bound (inclusive) of the surface_type bin of the matched unfiltering scene
  scene_bin_unfiltering_surface_type_max:
    dtype: float64
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Upper bound (exclusive) of the surface_type bin of the matched unfiltering scene
