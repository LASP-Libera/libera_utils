# Libera SCENE-ID-CAM product definition.

attributes:
  ProductID: SCENE-ID-CAM
  # These are populated at write time by the runner / write_libera_data_product (they must be present but their
  # values vary per file), matching the pattern used by the other Libera product definitions.
  algorithm_version: null
  date_created: null
  input_files: null

coordinates:
  # Time of observation, one value per footprint. Copied from the L1B_RAD/CAM coordinate convention so downstream
  # code can treat scene IDs and L1B records on a common time axis. The values are absolute datetimes; the encoding
  # re-expresses them as int64 "nanoseconds since 1958-01-01" (the CCSDS epoch used across Libera products).
  radiometer_time:
    dtype: datetime64[ns]
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: >-
        Time of each radiometer footprint observation (UTC) against a base reference of the CCSDS Epoch
        (January 1, 1958). Uniquely identifies each radiometer footprint.
    encoding:
      units: nanoseconds since 1958-01-01
      calendar: standard
      dtype: int64

variables:
  ########################
  # Input scene properties
  ########################
  igbp_surface_type:
    dtype: uint8
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: IGBP (International Geosphere-Biosphere Programme) land cover classification code
      valid_range: [1, 20]
  clear_area:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Clear-sky area of the footprint
      units: percent
      valid_range: [0, 100]
  cloud_fraction_lower:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Cloud fraction for the lower atmospheric layer
      units: percent
      valid_range: [0, 100]
  cloud_fraction_upper:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Cloud fraction for the upper atmospheric layer
      units: percent
      valid_range: [0, 100]
  solar_zenith_angle:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Solar zenith angle at the footprint surface
      units: degrees
      valid_range: [0, 180]
  viewing_zenith_angle:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Instrument viewing zenith angle at the footprint surface (SSF "view_zenith_angle")
      units: degrees
      valid_range: [0, 90]
  relative_azimuth_angle:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Relative azimuth angle between the solar and viewing directions at the footprint surface
      units: degrees
      valid_range: [0, 360]

  ##########################
  # Derived scene properties
  ##########################
  surface_type:
    dtype: uint8
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: TRMM surface type mapped from the IGBP land cover code (0 = ocean ... 5 = snow)
      valid_range: [0, 5]
  cloud_fraction:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Total cloud fraction over the footprint, 100 - clear_area
      units: percent
      valid_range: [0, 100]

  ############
  # Scene IDs
  ############
  scene_id_erbe:
    dtype: uint8
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: ERBE-like scene classification ID (0 = unmatched, 1-11 = scene)
      valid_range: [0, 11]
  scene_id_unfiltering:
    dtype: uint8
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Unfiltering scene classification ID (0 = unmatched, 1-11 = scene)
      valid_range: [0, 11]

  ##############################
  # ERBE scene property-bin bounds
  ##############################
  scene_bin_erbe_cloud_fraction_min:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Lower bound (inclusive) of the cloud_fraction bin of the matched ERBE scene
      units: percent
  scene_bin_erbe_cloud_fraction_max:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Upper bound (exclusive) of the cloud_fraction bin of the matched ERBE scene
      units: percent
  scene_bin_erbe_surface_type_min:
    dtype: uint8
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Lower bound (inclusive) of the surface_type bin of the matched ERBE scene
  scene_bin_erbe_surface_type_max:
    dtype: uint8
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Upper bound (exclusive) of the surface_type bin of the matched ERBE scene
  scene_bin_erbe_solar_zenith_angle_min:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Lower bound (inclusive) of the solar_zenith_angle bin of the matched ERBE scene
      units: degrees
  scene_bin_erbe_solar_zenith_angle_max:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Upper bound (exclusive) of the solar_zenith_angle bin of the matched ERBE scene
      units: degrees
  scene_bin_erbe_viewing_zenith_angle_min:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Lower bound (inclusive) of the viewing_zenith_angle bin of the matched ERBE scene
      units: degrees
  scene_bin_erbe_viewing_zenith_angle_max:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Upper bound (exclusive) of the viewing_zenith_angle bin of the matched ERBE scene
      units: degrees
  scene_bin_erbe_relative_azimuth_angle_min:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Lower bound (inclusive) of the relative_azimuth_angle bin of the matched ERBE scene
      units: degrees
  scene_bin_erbe_relative_azimuth_angle_max:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Upper bound (exclusive) of the relative_azimuth_angle bin of the matched ERBE scene
      units: degrees

  #####################################
  # Unfiltering scene property-bin bounds
  #####################################
  scene_bin_unfiltering_cloud_fraction_min:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Lower bound (inclusive) of the cloud_fraction bin of the matched unfiltering scene
      units: percent
  scene_bin_unfiltering_cloud_fraction_max:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Upper bound (exclusive) of the cloud_fraction bin of the matched unfiltering scene
      units: percent
  scene_bin_unfiltering_surface_type_min:
    dtype: uint8
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Lower bound (inclusive) of the surface_type bin of the matched unfiltering scene
  scene_bin_unfiltering_surface_type_max:
    dtype: uint8
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Upper bound (exclusive) of the surface_type bin of the matched unfiltering scene
  scene_bin_unfiltering_solar_zenith_angle_min:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Lower bound (inclusive) of the solar_zenith_angle bin of the matched unfiltering scene
      units: degrees
  scene_bin_unfiltering_solar_zenith_angle_max:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Upper bound (exclusive) of the solar_zenith_angle bin of the matched unfiltering scene
      units: degrees
  scene_bin_unfiltering_viewing_zenith_angle_min:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Lower bound (inclusive) of the viewing_zenith_angle bin of the matched unfiltering scene
      units: degrees
  scene_bin_unfiltering_viewing_zenith_angle_max:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Upper bound (exclusive) of the viewing_zenith_angle bin of the matched unfiltering scene
      units: degrees
  scene_bin_unfiltering_relative_azimuth_angle_min:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Lower bound (inclusive) of the relative_azimuth_angle bin of the matched unfiltering scene
      units: degrees
  scene_bin_unfiltering_relative_azimuth_angle_max:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Upper bound (exclusive) of the relative_azimuth_angle bin of the matched unfiltering scene
      units: degrees
  Quality_Flag:
    dtype: uint32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Bit flags indicating the quality of the data
      value_meaning: TBD. Example file from PREFIRE has this information laid out per-bit using [b0], [b1], etc.
