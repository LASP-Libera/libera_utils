# =============================================================================
# FMATCH-CAM Data Product Definition
# =============================================================================

attributes:
  # ProductID MUST be a valid DataProductIdentifier (constants.py). It is also
  # the operational-mode string for this product (OperationalMode.CAM.value).
  ProductID: FMATCH-CAM
  # Dynamic attributes (null here) are REQUIRED but supplied at write time.
  algorithm_version: null # semantic version of the FMATCH algorithm that produced the file
  date_created: null # ISO-8601 UTC timestamp of file creation
  input_files: null # provenance: the L1B + ancillary input files used

coordinates:
  # The per-footprint identifier. Each footprint is uniquely identified by the
  # radiometer observation time, so RADIOMETER_TIME is both the dimension and the
  # coordinate (same pattern as the *_JPSS_TIME coordinates in jpss_sc_pos_l1a.yml).
  # This is the `time_variable` passed to write_libera_data_product() for filename
  # start/end time generation.
  RADIOMETER_TIME:
    dtype: datetime64[ns]
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Radiometer footprint observation time
    encoding:
      # Stored on disk as int64 nanoseconds since the Libera/JPSS epoch (CF time).
      units: nanoseconds since 1958-01-01
      calendar: standard
      dtype: int64

variables:
  # ---------------------------------------------------------------------------
  # (a) Geolocation inputs (from L1B Daily; design §2.3.2 lists lat, lon, sza,
  #     vza, raa, alt). These describe WHERE the footprint is and the Sun-surface-
  #     sensor geometry. They are inputs (not PSF-aggregated ancillary data).
  # ---------------------------------------------------------------------------
  latitude:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Footprint boresight latitude
      units: degrees_north
      valid_range: [-90, 90]
  longitude:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Footprint boresight longitude
      units: degrees_east
      valid_range: [-180, 180]
  altitude:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # Spacecraft altitude above the reference ellipsoid at the time of the footprint.
      long_name: Spacecraft altitude above reference ellipsoid
      units: meters
  solar_zenith_angle:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # Angle between the local zenith and the direction to the Sun (SZA).
      long_name: Solar zenith angle
      units: degrees
      valid_range: [0, 180]
  viewing_zenith_angle:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # Angle between the local zenith and the direction to the sensor (VZA).
      long_name: Viewing zenith angle
      units: degrees
      valid_range: [0, 180]
  relative_azimuth_angle:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # Azimuth angle between the Sun and the sensor as seen from the footprint (RAA).
      long_name: Relative azimuth angle between Sun and sensor
      units: degrees
      valid_range: [0, 360]

  # ---------------------------------------------------------------------------
  # (b) Derived viewing geometry. These are COMPUTED from the angles above to
  #     characterize the Sun-surface-sensor scattering geometry (CERES/SSF
  #     heritage). They are stored on the product so downstream consumers
  #     (Scene ID, ADM binning) do not have to recompute them.
  #     The actual math lives in
  #     libera_utils/footprint_matching/product.compute_derived_viewing_geometry().
  # ---------------------------------------------------------------------------
  sunglint_angle:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # Angle between the sensor view direction and the specular (mirror)
      # reflection of the solar beam. Small values flag potential sun glint.
      long_name: Sun glint angle
      units: degrees
      valid_range: [0, 180]

  # ---------------------------------------------------------------------------
  # (c) PSF-aggregated external variables (one value per footprint).
  #     Variable names are <source_key>_<instrument>_<spec_name> for provenance
  #     (instrument token from each reader's INSTRUMENT attribute).
  #     DTYPEs match each reader's VariableSpec exactly. Aggregation strategy
  #     is noted per variable; it is configured on the reader side, not here.
  #     Readers: libera_utils/footprint_matching/readers/{era5,igbp,nsidc,viirs}.py
  # ---------------------------------------------------------------------------
  # --- source reader: era5 (resolution 25.0 km) ---
  era5_ECMWF_wind_u10:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: era5 (aggregation: weighted_mean)
      long_name: Eastward wind component at 10 m
      units: m/s
  era5_ECMWF_wind_v10:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: era5 (aggregation: weighted_mean)
      long_name: Northward wind component at 10 m
      units: m/s
  # --- source reader: igbp (resolution 1.0 km) ---
  igbp_MODIS_surface_type:
    dtype: int16
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: igbp (aggregation: weighted_mode)
      # https://climatedataguide.ucar.edu/climate-data/ceres-igbp-land-classification
      long_name: IGBP surface type classification
      valid_range: [1, 20]
  # --- source reader: nise (resolution 25.0 km) ---
  nise_SSMIS_sea_ice_concentration:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: nise (aggregation: weighted_mean)
      # PSF-weighted mean sea ice concentration derived from NISE Extent codes 1–100
      # (code / 100.0). Permanent ice (code 101) counts as 1.0. Range [0, 1].
      # https://nsidc.org/data/nise/versions/5
      long_name: Sea ice concentration (fraction)
      units: "1"
      valid_range: [0, 1]
  nise_SSMIS_no_ice_or_snow:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: nise (aggregation: weighted_mean)
      # Fraction of PSF-weighted footprint area where NISE code 0 (no ice or snow —
      # open ocean, snow-free land, or outside grid). Range [0, 1].
      long_name: Fraction of footprint with no ice or snow (NISE code 0)
      units: "1"
      valid_range: [0, 1]
  nise_SSMIS_permanent_ice:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: nise (aggregation: weighted_mean)
      # Fraction of PSF-weighted footprint area where NISE code 101 (permanent ice:
      # Greenland Ice Sheet, Antarctic ice shelves). Range [0, 1].
      long_name: Fraction of footprint covered by permanent ice (NISE code 101)
      units: "1"
      valid_range: [0, 1]
  nise_SSMIS_dry_snow_on_land:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: nise (aggregation: weighted_mean)
      # Fraction of PSF-weighted footprint area where NISE codes 103–110 (dry snow
      # on land). Range [0, 1].
      long_name: Fraction of footprint covered by dry snow on land (NISE codes 103-110)
      units: "1"
      valid_range: [0, 1]
  nise_SSMIS_snow_ice_missing:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: nise (aggregation: weighted_mean)
      # Fraction of PSF-weighted footprint area where NISE code 255 (missing/no
      # retrieval). High values flag unreliable ice/snow classification.
      long_name: Fraction of footprint with missing NISE retrieval (NISE code 255)
      units: "1"
      valid_range: [0, 1]
  # --- source reader: viirs_brdf (resolution 5.6 km) ---
  # Ross-Thick/Li-Sparse model decomposes surface reflectance into isotropic
  # (fiso), volumetric (fvol), and geometric (fgeo) kernel weights, per spectral
  # band (shortwave/vis/nir). All aggregation: weighted_mean.
  # https://www.earthdata.nasa.gov/data/catalog/lpcloud-vj143c1-002
  viirs_brdf_NOAA20_brdf_shortwave_fiso:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Shortwave BRDF isotropic kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_shortwave_fvol:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Shortwave BRDF volumetric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_shortwave_fgeo:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Shortwave BRDF geometric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_vis_fiso:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Visible BRDF isotropic kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_vis_fvol:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Visible BRDF volumetric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_vis_fgeo:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Visible BRDF geometric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_nir_fiso:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Near-infrared BRDF isotropic kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_nir_fvol:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Near-infrared BRDF volumetric kernel weight
      units: "1"
  viirs_brdf_NOAA20_brdf_nir_fgeo:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: viirs_brdf (aggregation: weighted_mean)
      long_name: Near-infrared BRDF geometric kernel weight
      units: "1"
  # --- source reader: viirs_cloud (resolution 111.0 km) ---
  viirs_cloud_NOAA20_cloud_fraction:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: viirs_cloud (aggregation: weighted_mean)
      long_name: Cloud fraction
      units: "1"
      valid_range: [0, 1]
  viirs_cloud_NOAA20_cloud_optical_thickness:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: viirs_cloud (aggregation: weighted_log_mean (geometric mean))
      long_name: Cloud optical thickness
      units: "1"
  viirs_cloud_NOAA20_cloud_top_pressure:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      # source: viirs_cloud (aggregation: weighted_mean)
      long_name: Cloud top pressure
      units: hPa

  # ---------------------------------------------------------------------------
  # (d) Coverage / QA. The design (§1.4) requires coverage statistics and QA
  #     flags alongside the aggregated values so downstream algorithms know the
  #     provenance/quality of each footprint (CERES partial-coverage convention:
  #     accept >95% PSF energy, flag 75-95%, discard <75%).
  # ---------------------------------------------------------------------------
  psf_bbox_lat_min:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Southern latitude bound of PSF bounding box
      units: degrees_north
      valid_range: [-90, 90]
  psf_bbox_lat_max:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Northern latitude bound of PSF bounding box
      units: degrees_north
      valid_range: [-90, 90]
  psf_bbox_lon_min:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Western longitude bound of PSF bounding box
      units: degrees_east
      valid_range: [-180, 180]
  psf_bbox_lon_max:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Eastern longitude bound of PSF bounding box
      units: degrees_east
      valid_range: [-180, 180]
  psf_coverage_fraction:
    dtype: float32
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Fraction of PSF energy covered by valid ancillary data
      units: "1"
      valid_range: [0, 1]
  q_flags:
    dtype: int64
    dimensions: ["RADIOMETER_TIME"]
    attributes:
      long_name: Quality flags (bitwise)
      valid_range: [0, 2147483647]

