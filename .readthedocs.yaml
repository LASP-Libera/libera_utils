version: 2

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.11"
  jobs:
    post_create_environment:
      # Install poetry
      - pip install poetry
    post_install:
      # Install dependencies. Our doc building dependencies are kept in the docgen dependency group
       - VIRTUAL_ENV=$READTHEDOCS_VIRTUALENV_PATH poetry install --with docgen --without dev

formats:
  - pdf

sphinx:
  configuration: doc/source/conf.py
