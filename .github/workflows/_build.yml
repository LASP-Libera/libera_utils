name: Build PyPI artifacts (reusable)
# This is a reusable workflow that builds PyPI distribution artifacts
# It can be called by other workflows (e.g., CI tests, releases)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  # Job that builds PyPI style distribution artifacts
  build-dist-artifacts:
    # This job uses standard Python tools (pip, build, twine) for PEP 517/518 compliant packaging
    # The project uses poetry as the build backend, which is automatically installed by pip
    name: Build for PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install build twine

      - name: Build wheel and source distribution
        run: |
          python -m build

      - name: Check README rendering for PyPI
        run: twine check dist/*

      - name: Verify installation of built wheel
        run: |
          python -m pip install dist/*.whl
          python -c "import libera_utils"
          which libera-utils
          cat $(which libera-utils)
          libera-utils --version

      # Save ("upload") the distribution artifacts for use by downstream Actions jobs
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7 # This allows us to persist the dist directory after the job has completed
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
