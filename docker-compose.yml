services:
  sdp:
    platform: linux/amd64
    image: libera-utils:latest
    build:
      context: .
      target: libera-utils

  # Tests against the default version of python in the Dockerfile
  tests:
    platform: linux/amd64
    image: libera-utils-test:latest
    build:
      context: .
      target: libera-utils-test
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # Tests against Python 3.11 (EOL 2027-10)
  3.11-tests:
    platform: linux/amd64
    image: libera-utils-test:latest
    build:
      context: .
      target: libera-utils-test
      args:
        - BASE_IMAGE_PYTHON_VERSION=3.11
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # Tests against Python 3.10 (EOL 2026-10)
  3.10-tests:
    platform: linux/amd64
    image: 3.10-test:latest
    build:
      context: .
      target: libera-utils-test
      args:
        - BASE_IMAGE_PYTHON_VERSION=3.10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # Tests against Python 3.9 (EOL 2025-10)
  3.9-tests:
    platform: linux/amd64
    image: 3.9-tests:latest
    build:
      context: .
      target: libera-utils-test
      args:
        - BASE_IMAGE_PYTHON_VERSION=3.9
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  linting:
    image: libera-utils-test:latest
    build:
      context: .
      target: libera-utils-test
    entrypoint: ["pylint", "libera_utils"]

  ast:
    image: libera-utils-test:latest
    build:
      context: .
      target: libera-utils-test
    entrypoint: [ "bandit", "-r", "libera_utils" ]