version: '3.8'

services:
  local-db:
    platform: linux/amd64
    image: postgres:14
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=libera_master
      - POSTGRES_PASSWORD=masterpass
      - POSTGRES_DB=libera
    volumes:
      - ./database/initdb:/docker-entrypoint-initdb.d

  flyway:
    platform: linux/amd64
    image: flyway/flyway:latest
    environment:
      - FLYWAY_TARGET=${FLYWAY_TARGET:-latest}
      - FLYWAY_PASSWORD=masterpass
      - FLYWAY_CONNECT_RETRIES=60
    command: -url=jdbc:postgresql://local-db:5432/libera migrate
    volumes:
      - ./database/migrations:/flyway/sql
      - ./database/flyway.conf:/flyway/conf/flyway.conf
    depends_on:
      - local-db

  rds-flyway:
    platform: linux/amd64
    image: flyway/flyway:latest
    environment:
      - FLYWAY_TARGET=${FLYWAY_TARGET:-latest}
      - FLYWAY_PASSWORD=${FLYWAY_PASSWORD}
      - FLYWAY_CONNECT_RETRIES=60
    command: -url=jdbc:postgresql://${RDS_DBHOST}/libera migrate
    volumes:
      - ./database/migrations:/flyway/sql
      - ./database/flyway.conf:/flyway/conf/flyway.conf

  sdp:
    platform: linux/amd64
    image: libera-utils:latest
    build:
      context: .
      target: libera-utils

  tests:
    platform: linux/amd64
    image: libera-utils-test:latest
    build:
      context: .
      target: libera-utils-test
      args:
        - BASE_IMAGE_PYTHON_VERSION=3.11
    environment:
      - LIBERA_DB_HOST=local-db
    depends_on:
      flyway:
        condition: service_completed_successfully

  3.9-tests:
    platform: linux/amd64
    image: 3.9-tests:latest
    build:
      context: .
      target: libera-utils-test
      args:
        - BASE_IMAGE_PYTHON_VERSION=3.9
    environment:
      - LIBERA_DB_HOST=local-db
    depends_on:
      flyway:
        condition: service_completed_successfully

  3.10-tests:
    platform: linux/amd64
    image: 3.10-test:latest
    build:
      context: .
      target: libera-utils-test
      args:
        - BASE_IMAGE_PYTHON_VERSION=3.10
    environment:
      - LIBERA_DB_HOST=local-db
    depends_on:
      flyway:
        condition: service_completed_successfully

  docs-confluence:
    image: libera-utils-docs:latest
    build:
      context: .
      target: libera-utils-docs
    command: ["confluence"]

  docs-html:
    image: libera-utils-docs:latest
    build:
      context: .
      target: libera-utils-docs
    command: [ "clean", "html" ]

  linting:
    image: libera-utils-test:latest
    build:
      context: .
      target: libera-utils-test
    entrypoint: ["pylint", "libera_utils"]

  ast:
    image: libera-utils-test:latest
    build:
      context: .
      target: libera-utils-test
    entrypoint: [ "bandit", "-r", "libera_utils" ]