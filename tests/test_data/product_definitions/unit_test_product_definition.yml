# Product level metadata attributes
# Key-value pairs. These and only these keys are allowed and all are required (not null) on the data product.
# Values provided here are strictly required and may not be overwritten.
attributes:
  ProductID: RAD-4CH
  algorithm_version: 0.0.1

# Coordinates
# Dimension coordinates (coordinate name = dimension name) must be 1D arrays
# Non-dimension coordinates can be multi-dimensional arrays and/or have a different dimension name than the coordinate itself
coordinates:
  radiometer_time:
    dtype: datetime64[ns]
    dimensions: ["radiometer_time"] # Optional, defaults to the name of the coordinate. Must exist in dimensions list
    attributes:
      long_name: "Time of sample collection"
    encoding:
      units: nanoseconds since 1958-01-01
      calendar: standard
      dtype: int64
  lat:
    dtype: float64
    attributes:
      long_name: Geolocation latitude
      units: degrees
      valid_range: [-90, 90]
    dimensions: ["radiometer_time"]
  lon:
    dtype: float64
    dimensions: ["radiometer_time"]
    attributes:
      long_name: Geolocation longitude
      units: degrees
      valid_range: [-180, 180]

# Data Variables
variables:
  fil_rad:
    dtype: float64
    dimensions: ["radiometer_time"]
    attributes:
      long_name: Filtered Radiance
      units: W/(m^2*sr*nm)
      valid_range: [0, 1000]
  q_flag:
    dtype: int32
    dimensions: ["radiometer_time"]
    attributes:
      long_name: Quality Flags
      valid_range: [0, 2147483647]
  cartesian_position:
    dtype: float32
    dimensions: ["radiometer_time", "euclidean_dim"]
    attributes:
      long_name: Cartesian SC position
      units: km
      valid_range: [-100000, 100000]
