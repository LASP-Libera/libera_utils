attributes:
  ProductID: CAM
  version: 0.0.1
coordinates:
  time:
    dtype: datetime64[ns]
    dimensions: ["time"]
    attributes:
      long_name: Time of sample collection
    encoding:
      units: nanoseconds since 1958-01-01
      calendar: standard
      dtype: int64
  camera_pixel_count_x:
    dtype: int32
    dimensions: ["camera_pixel_count_x"]
    attributes:
      long_name: Number of pixels in the x direction of the camera
      valid_range: [1, 4096]
  camera_pixel_count_y:
    dtype: int32
    dimensions: ["camera_pixel_count_y"]
    attributes:
      long_name: Number of pixels in the y direction of the camera
      valid_range: [1, 4096]
variables:
  pix_rad:
    dtype: float64
    dimensions: ["time", "camera_pixel_count_x", "camera_pixel_count_y"]
    attributes:
      long_name: Filtered Radiance of each pixel
      units: W/(m^2*sr*nm)
  pix_lat:
    dtype: float64
    dimensions: ["time", "camera_pixel_count_x", "camera_pixel_count_y"]
    attributes:
      long_name: Geolocation latitude of each pixel
      units: degrees
      valid_range: [-90, 90]
  pix_lon:
    dtype: float64
    dimensions: ["time", "camera_pixel_count_x", "camera_pixel_count_y"]
    attributes:
      long_name: Geolocation longitude of each pixel
      units: degrees
      valid_range: [-180, 180]
  mask:
    dtype: int64
    dimensions: ["time", "camera_pixel_count_x", "camera_pixel_count_y"]
    attributes:
      long_name: Pixel level mask for data
      units: W/(m^2*sr*nm)
      valid_range: [0, 1]
  q_flags:
    dtype: int64
    dimensions: ["time"]
    attributes:
      long_name: Quality Flags
      valid_range: [0, 2147483647]
